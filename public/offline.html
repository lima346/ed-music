<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SopMusic - Offline</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0a; color:#fff; font-family:'Inter',system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:20px; }
    .icon { font-size:64px; margin-bottom:16px; }
    h1 { font-size:24px; font-weight:700; margin-bottom:8px; }
    p { color:#b3b3b3; font-size:14px; margin-bottom:24px; }
    button { background:#1DB954; color:#000; font-weight:600; padding:12px 32px; border-radius:50px; border:none; font-size:14px; cursor:pointer; }
  </style>
</head>
<body>
  <div>
    <div class="icon">🎵</div>
    <h1>Você está offline</h1>
    <p>Verifique sua conexão e tente novamente</p>
    <button onclick="location.reload()">Tentar Novamente</button>
  </div>
</body>
</html>
